name: Daily cash report

on:
  schedule:
    # 14:00 UTC = 7:00 AM America/Phoenix year-round (Arizona has no DST).
    # If you change TIMEZONE, recompute this. GitHub cron is always UTC.
    - cron: "0 14 * * *"
  # Lets you trigger a test run from the Actions tab.
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - run: npm run report
        env:
          MERCURY_API_TOKEN: ${{ secrets.MERCURY_API_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TIMEZONE: America/Phoenix
